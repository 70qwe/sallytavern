---
变量更新规则:
  世界信息:
    日期:
      format: xxxx年x月x日，星期x
      check:
        - 跨日或日期明确变化时更新
    时间:
      format: HH:mm（24h 制）
      check:
        - 随剧情推进更新；拍摄、直播、通勤、睡眠等长事件必须推进时间
    地点:
      check:
        - 当前场景地点变化时更新，具体到可支撑互动的层级
    天气:
      check:
        - 当前天气变化时更新，如晴、多云、小雨、雪等
    主角:
      type: |-
        {
          姓名: string;
          人物状态: string;
          人物衣着: {
            头部: string; 上衣: string; 外套: string; 下装: string;
            内衣裤: string; 袜子: string; 鞋子: string; 手持物: string;
          };
          超能力槽: {
            槽位一|槽位二|槽位三: { 名称: string; 效果: string; }
          };
        }
      check:
        - 始终代表 {{user}} 本人，恒定存在，不可 remove
        - 姓名为 {{user}} 的真实姓名；人物状态记录其当前情绪、体态、处境
    主角.人物衣着.${头部|上衣|外套|下装|内衣裤|袜子|鞋子|手持物}:
      check:
        - initvar 已预置全部 8 槽为空字符串，穿衣/脱衣/换装一律用 replace 对应槽位路径
        - 首回合开场白（第一条 assistant 回复）：若八槽仍皆空，本回合必须 replace 全部 8 槽，据 {{user}}、地点、天气、时间推断完整着装；至少写入 上衣、下装、内衣裤、袜子、鞋子，头部/外套/手持物未穿戴可留 ""
        - 非首回合：正文写穿脱换损时同步对应槽；已有着装时不可只改上下装而漏写仍应穿着的内衣裤/袜子/鞋子（全裸/半裸剧情则对应槽 replace 为 ""）
        - 日常更新未提及的槽位保持不动
    主角.超能力槽:
      type: |-
        {
          槽位一|槽位二|槽位三: {
            名称: string;
            效果: string;
          }
        }
      check:
        - initvar 已预置三个空槽；仅网黄培养系统等官方奖励发放时可 replace 写入
        - 未获得能力时 名称、效果 皆留 ""；不可 insert 新槽、不可 remove 槽位键
        - 能力被回收或失效时 replace 对应槽回空
    主角.超能力槽.${槽位一|槽位二|槽位三}:
      check:
        - 系统奖励明确到账时 replace 该槽 名称 与 效果；日常剧情勿擅自写入
    人物:
      type: |-
        {
          [人物id: string]: {
            姓名: string;
            与user关系: string;
            人物状态: string;
            人物衣着: {
              头部: string; 上衣: string; 外套: string; 下装: string;
              内衣裤: string; 袜子: string; 鞋子: string; 手持物: string;
            };
          }
        }
      check:
        - 只记录当前地点内对剧情有影响的人物
        - 新人物出场必须用 insert `/世界信息/人物/${人物id}`，禁止用 replace 写入整个 人物 对象
        - 人物离开当前地点可 remove 对应人物id
    人物.*.人物衣着.${头部|上衣|外套|下装|内衣裤|袜子|鞋子|手持物}:
      check:
        - insert 新人物时 value.人物衣着 须含全部 8 槽键；明确穿、脱、换、损时 replace 对应槽；日常更新未提及的槽位保持不动
    环境重要物品:
      type: |-
        {
          [物品id: string]: {
            名称: string;
            物品位置: string;
            物品状态: string;
          }
        }
      check:
        - 仅记录当前 地点 内可触摸的现实实体（床、手机、摄像机、门、货架等）；须能被看见、拿起、移动或损坏
        - 禁止写入：网黄培养系统/任务系统/UI/面板/浮窗/弹窗/状态栏/HUD 及一切仅 {{user}} 主观可见、他人无法触碰的虚拟界面；系统播报只写正文，不进变量
        - 账号/视频/留言/打赏走 空间信息 或 视频信息，不得写入本字段
        - 地点变化时旧场景物品由脚本自动清除；仅需 insert 新场景物品，勿手动 remove 旧条目
        - 物品移动、损坏、被使用、被拿走时 replace 位置或状态
    财富:
      type: number
      check:
        - user 可支配金钱；打赏、收入、消费、购物、罚款等直接增减
        - 与 空间信息.总打赏 不同：财富可花可减，总打赏仅为累计记录
    资产:
      type: |-
        {
          [资产id: string]: {
            名称: string;
            类型: string;
            状态: string;
            备注: string;
          }
        }
      check:
        - 获得、出售、损坏、抵押、丢失资产时更新

  空间信息:
    账号名称:
      check:
        - 初始为「纯情小猫猫」，仅主动改名或系统改名时更新
    个性签名:
      check:
        - 初始为「暂无个性签名」，user 编辑后更新
    当前装扮:
      check:
        - 更换空间主题、皮肤或布局时更新
    人气值:
      type: number
      check:
        - 由粉丝量、视频热度、总打赏、直播表现综合评定
        - 账号影响力显著变化时更新
    粉丝量:
      type: number
      check:
        - 涨粉、掉粉、清粉时更新
    视频数量:
      type: number
      check:
        - 新发布一条视频 +1，删除或下架 -1
    是否正在直播:
      check:
        - 开播 replace 为「是」，下播或结束 replace 为「否」
    总打赏:
      type: number
      check:
        - 空间内视频与直播累计打赏总额，仅作统计记录，只增不减
        - 新打赏 delta 增加，同额同步 delta 世界信息.财富

  视频信息:
    type: |-
      {
        [视频id: string]: {
          视频标题: string;
          视频简介: string;
          时长: string;
          发布时间: string;
          播放量: number;
          留言: {
            [留言id: string]: {
              留言用户: string; 留言内容: string; 留言时间: string;
              user的回复: string; 回复时间: string;
            }
          };
          打赏: {
            [打赏id: string]: { 打赏用户: string; 打赏数额: number; }
          };
          视频内容: {
            参演人员: { [参演者id: string]: string };
            演出地点: string;
            视频内容: string;
            重要台词: { [台词id: string]: string };
          };
        }
      }
    check:
      - 发布视频时 insert 新视频id，并 delta 空间信息.视频数量
    视频信息.*.时长:
      check:
        - 发布时写入，发布后固定不变
    视频信息.*.发布时间:
      check:
        - 发布时写入「x月x号 HH:mm」，发布后固定不变
    视频信息.*.播放量:
      type: number
      check:
        - 初始 0，可随时间或热度上涨；热度停止后不再增长，不无故下降
    视频信息.*.留言:
      check:
        - 新留言 insert；user 回复时更新 user的回复 与 回复时间
    视频信息.*.打赏:
      check:
        - 新打赏 insert，同时 delta 空间信息.总打赏 与 世界信息.财富（同额）
    视频信息.*.视频内容:
      check:
        - 发布时写入的历史记录，不随当前场景自动改写
    视频信息.*.视频内容.参演人员:
      check:
        - 无他人时仅 insert user 的账号名；有合作者时 insert 对应参演者id
    视频信息.*.视频内容.重要台词:
      check:
        - 记录视频中最有代表性的短句，格式固定为「发言人：台词内容」
        - 发言人可以是人物姓名、账号名、{{user}} 或「旁白」；不确定时不要省略发言人
