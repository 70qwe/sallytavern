---
变量输出格式:
  rule:
    - 回复末尾一次输出 <UpdateVariable>，含 <Analysis> 与 <JSONPatch>
    - Patch 为合法 JSON 数组；op 支持 replace / delta / insert / remove / move（数组追加用 path 末尾 `/-`）
    - 勿 Patch 以 `_` 开头的只读字段（如 _商城刷新于天数）
    - 若 /主角/衣着 九槽仍皆 ""：须在本回合 Patch 写入（据 maintext 穿脱描写，或据 {{user}}·地点·天气·季节推断默认着装；至少上衣/下装/鞋子）
  format: |-
    <UpdateVariable>
    <Analysis>$(ENGLISH, ≤80 words: time passed; dramatic update allowed y/n; per-field check summary)</Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/path", "value": "..." },
      { "op": "delta", "path": "/path/number", "value": 0 },
      { "op": "insert", "path": "/path/key", "value": {} },
      { "op": "remove", "path": "/path/key" },
      { "op": "move", "from": "/path/a", "to": "/path/b" }
    ]
    </JSONPatch>
    </UpdateVariable>
  区块索引:
    - 世界：日期(含时刻 XX年X月X日 XX：XX)、地点、天气、生存天数、季节、当前赛季、赛季预计持续时间
    - 主角：uid、姓名、种族、昵称、梦魇欲魔、sp、污染值、饱食度、三维、总评+评语、衣着九槽
    - 背包：已用格子/格子上限、物品栏
    - 狩猎：进行中(含沦陷度)、已奴隶
    - 论坛：帖子、私信
    - 交易：系统商城、玩家交易
    - 副本列表、排行榜（杀戮榜·地区/全球、财富榜·地区/全球、总榜）
