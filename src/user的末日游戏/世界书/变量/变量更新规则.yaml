---
变量更新规则:
  世界:
    日期:
      check:
        - 跨日或跳日时更新；格式「XX年X月X日 XX：XX」，全角冒号；随剧情推进更新时刻
    地点:
      check:
        - 场景变更时更新
    天气:
      check:
        - 时间/区域/气象事件变化时更新，与地点季节自洽
    生存天数:
      type: number
      check:
        - 完整昼夜或明确跳日 +1；跳日须说明原因
        - 生存天数 +1 时系统商城由脚本刷新，勿 Patch 系统商城或 _商城刷新于天数
    季节:
      check:
        - 长时段或自然阶段变化时更新
    当前赛季:
      check:
        - 世界规则或玩法阶段切换时更新
    赛季预计持续时间:
      check:
        - 与当前赛季同步调整

  主角:
    uid:
      check:
        - 格式「姓名首字母-00010086」，绑定 {{user}}；仅账户重置时可改
    种族:
      check:
        - 默认人类；污染叙事超 100 可改非人种族，须剧情因果
    昵称:
      check:
        - 改名或剧情赋予外号时更新
    梦魇欲魔:
      type: '{ 名称: 梦魇欲魔; 阶段: 一|二|三|四; 能力列表: Record<一|二|三|四, string> }'
      check:
        - 名称不变；阶段仅重大进阶时变，单次至多一级；能力列表四键常驻，勿清空
    sp:
      type: number
      check:
        - 狩猎/交易/系统奖惩时调整
    污染值:
      type: number
      range: 0~999
      check:
        - 污染源、风险行为上升；净化、医疗、休息可下降
    饱食度:
      type: number
      range: 0~999
      check:
        - 进食饮水恢复；跋涉、战斗、疾病消耗
    力量.${当前|上限}:
      type: number
      check:
        - initvar 不写当前；首次盘点 Patch 写入；档位：残疾0/儿童0~10/瘦小10~20/普通男20~30/强壮男40~50/>50须超常叙事
        - 偏重爆发负重；训练伤病道具可改，单次宜克制
    体质.${当前|上限}:
      type: number
      check:
        - 档位同力量；偏重续航恢复
    敏捷.${当前|上限}:
      type: number
      check:
        - 档位同力量；偏重反应机动
    角色总评:
      check:
        - 系统或剧情明确重评时变动，E~SSS
    角色总评评语:
      check:
        - 与总评同步的短评；非重评回合不必改
    衣着:
      type: 九槽 string（上衣/下装/外套/帽子/内衣裤/袜子/鞋子/饰品/手持物）
      check:
        - 未穿戴保持 ""，勿写「无」；换装/损毁时更新对应槽

  背包.${已用格子|格子上限}:
    type: number
    check:
      - 拾取/丢弃/堆叠时同步；扩容可提高上限（默认 30）

  物品栏:
    type: '{ [id]: { 名称, 数量, 最大堆叠, 描述, 稀有度 E~SSS } }'
    check:
      - 拾取/消耗/丢弃时更新；数量 0 则 remove；新物品 insert 随机 id

  狩猎名单:
    进行中:
      type: |-
        { [id]: { 姓名, uid, 昵称, 种族, 污染值, 身份, 年龄, 精液质量 E~SSS, 天赋,
          力量/体质/敏捷{当前,上限}, 沦陷度 0~100, 当前位置, 当前状态, 预计产出SP, 衣着九槽 } }
      check:
        - 种族/污染/衣着规则同主角；新增目标时写入三维（档位同主角力量）
        - 沦陷度达 100：从进行中 remove，在已奴隶 insert 同源数据（可 move）；去掉沦陷度，当前状态→当前状态或用途
    已奴隶:
      type: |-
        { [id]: { 姓名, uid, 昵称, 种族, 污染值, 身份, 年龄, 精液质量 E~SSS, 天赋,
          力量/体质/敏捷{当前,上限}, 当前位置, 当前状态或用途, 预计产出SP, 衣着九槽 } }
      check:
        - 沦陷度 100 或剧情奴役时转入；无沦陷度字段；衣着随转入保留

  玩家论坛:
    帖子:
      type: '{ [id]: { 主题, 发帖人, 内容, 发帖时间 } }'
      check:
        - 每回合整体刷新帖子表；含主题/正文/发帖人/时间；可噪音帖与主线讨论混排
    私信:
      type: '{ [id]: { 发送人, 内容, 发送时间 } }'
      check:
        - 剧情触发时追加；旧信可 remove

  交易行:
    系统商城:
      type: '{ [id]: { 名称, 价格, 备注 } }'
      check:
        - 由脚本按生存天数刷新十项基础生存物资；LLM 勿 Patch
        - 禁止武器、奢侈品、狩猎/副本专属、色情向商品
    _商城刷新于天数:
      type: number
      check:
        - 只读，脚本维护
    玩家交易:
      type: '{ [id]: { 物品名称, 售卖人, 上架时间, 价格 } }'
      check:
        - 挂单/撤单/成交时更新；成交 remove

  副本列表:
    type: '{ [id]: { 副本名称, 副本内容, 副本难度, 副本地点, 副本奖励 } }'
    check:
      - 发现或开放新关卡时 insert

  排行榜:
    type: '{ [id]: { 排名, 上榜人昵称 } }'
    check:
      - 大型结算或赛季刷新时调整；排名唯一
