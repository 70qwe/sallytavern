---
变量更新规则:
  世界:
    日期:
      check:
        - 跨日或跳日时更新；格式「XX年X月X日 XX：XX」，全角冒号；随剧情推进更新时刻
    地点:
      check:
        - 场景变更时更新
    天气:
      check:
        - 时间/区域/气象事件变化时更新，与地点季节自洽
    生存天数:
      type: number
      check:
        - 完整昼夜或明确跳日 +1；跳日须说明原因
        - 生存天数 +1 时系统商城由脚本刷新，勿 Patch 系统商城或 _商城刷新于天数
    季节:
      check:
        - 长时段或自然阶段变化时更新
    当前赛季:
      check:
        - 世界规则或玩法阶段切换时更新
    赛季预计持续时间:
      check:
        - 与当前赛季同步调整

  主角:
    uid:
      check:
        - 格式「姓名首字母-00010086」，绑定 {{user}}；仅账户重置时可改
    种族:
      check:
        - 默认人类；污染叙事超 100 可改非人种族，须剧情因果
    昵称:
      check:
        - initvar 初始值为「[未命名]」；正文未改前保持不动
        - '{{user}} 在玩家论坛取论坛名（注册/设置登陆昵称）时，replace 为所取论坛名'
        - 剧情赋予其它外号时亦可更新，但不得以论坛名之外的随意称呼覆盖已确立的论坛名，除非正文明确改名
    梦魇欲魔:
      type: '{ 名称: 梦魇欲魔; 阶段: 一|二|三|四; 能力列表: Record<一|二|三|四, string> }'
      check:
        - 名称不变；阶段仅重大进阶时变，单次至多一级；能力列表四键常驻，勿清空
    sp:
      type: number
      check:
        - 狩猎/交易/系统奖惩时调整
    污染值:
      type: number
      range: 0~999
      check:
        - 污染源、风险行为上升；净化、医疗、休息可下降
    饱食度:
      type: number
      range: 0~999
      check:
        - 进食饮水恢复；跋涉、战斗、疾病消耗
    力量.${当前|上限}:
      type: number
      check:
        - initvar 不写当前；首次盘点 Patch 写入；档位：残疾0/儿童0~10/瘦小10~20/普通男20~30/强壮男40~50/>50须超常叙事
        - 偏重爆发负重；训练伤病道具可改，单次宜克制
    体质.${当前|上限}:
      type: number
      check:
        - 档位同力量；偏重续航恢复
    敏捷.${当前|上限}:
      type: number
      check:
        - 档位同力量；偏重反应机动
    角色总评:
      check:
        - 系统或剧情明确重评时变动，E~SSS
    角色总评评语:
      check:
        - 与总评同步的短评；非重评回合不必改
    衣着:
      type: 九槽 string（上衣/下装/外套/帽子/内衣裤/袜子/鞋子/饰品/手持物）
      check:
        - 正文明确穿、脱、换、损→同步更新对应槽；正文未提及且槽位已有内容→保持不动，勿清空
        - 正文未写衣着但 stat_data 中主角.衣着仍全空→须据 {{user}} 人设与世界.地点/天气/季节推断「适配当下环境」的日常着装并 Patch（至少写入上衣/下装/鞋子；其余槽视场景，未穿戴可留空或随意简述）
        - 首回合开局盘点、或首次确立 {{user}} 在场形象时：若衣着仍全空，本回合必须写入上述默认着装（与首次写入力量.当前同级优先级，不可跳过）
        - 狩猎名单条目首次 insert 时须同步写入该条目的衣着九槽，规则同主角

  背包.${已用格子|格子上限}:
    type: number
    check:
      - 拾取/丢弃/堆叠时同步；扩容可提高上限（默认 30）

  物品栏:
    type: '{ [id]: { 名称, 数量, 最大堆叠, 描述, 获取来源, 稀有度 E~SSS } }'
    check:
      - 拾取/消耗/丢弃时更新；数量 0 则 remove；新物品 insert 随机 id
      - insert 时须写 描述（用途/外观一两句）与 获取来源（如「系统商城购买」「某某地点搜刮」）；已有条目未变则不必改

  狩猎名单:
    进行中:
      type: |-
        { [id]: { 姓名, uid, 昵称, 种族, 污染值, 身份, 年龄, 精液质量 E~SSS（可带 ± 后缀如 A-/A+）, 天赋,
          力量/体质/敏捷{当前,上限}, 沦陷度 0~100, 当前位置, 当前状态, 预计产出SP, 衣着九槽 } }
      check:
        - 种族/污染/衣着规则同主角（含：条目衣着全空时须写入环境默认着装）；新增目标时写入三维（档位同主角力量）
        - 沦陷度达 100：从进行中 remove，在已奴隶 insert 同源数据（可 move）；去掉沦陷度，当前状态→当前状态或用途
      沦陷度:
        type: number
        range: 0~100
        check:
          - 须据本回合 maintext 分析该目标对 {{user}} 的主观态度；只增不减，无好感进展则保持原值
          - 正文体现信任、依赖、心动、主动亲近、为 user 破例等好感上升→可用 delta 增加；反感、厌恶、拒绝、被冒犯、对 user 所作所为不满→不涨
          - 增长须困难、克制：通常单回合 delta +0~+3；重大情感突破或关键剧情节点至多 +5~+8；日常互动、单方面讨好、无功而返、纯肉体接触而无心理认可→+0
          - 禁止因挫折、争吵、失败而减少沦陷度；禁止无正文依据的暴涨（角色不可白给）
      精液质量:
        check:
          - 评级 E~SSS；可在某一档内浮动，写作「档-」「档+」（如 A-、A+），表示略低于/略高于该档基准
          - 新增目标或剧情明确重评时 replace；无依据勿改
      预计产出SP:
        type: number
        check:
          - 与精液质量基准挂钩：E=1、D=5、C=10、B=20、A=50、S=100、SS=150、SSS=200
          - 带「-」后缀时可在基准值下浮（约 75%~90%）；带「+」后缀时可上浮（约 110%~125%）；无后缀取基准或邻近整数
          - 条目 insert 或精液质量变更时须同步 replace；污染/状态叙事影响产出时可小幅微调，但须与上表自洽
      天赋:
        check:
          - 该条目污染值 >80 时写入具体天赋名（据人设/种族/污染叙事）；≤80 时为「无」
          - 污染值跨 80 阈值时须同步更新；已奴隶条目规则相同
    已奴隶:
      type: |-
        { [id]: { 姓名, uid, 昵称, 种族, 污染值, 身份, 年龄, 精液质量 E~SSS（可带 ± 后缀）, 天赋,
          力量/体质/敏捷{当前,上限}, 当前位置, 当前状态或用途, 预计产出SP, 衣着九槽 } }
      check:
        - 沦陷度 100 或剧情奴役时转入；无沦陷度字段；衣着随转入保留
        - 精液质量、预计产出SP、天赋之更新规则同「进行中」对应字段

  玩家论坛:
    帖子:
      type: '{ [id]: { 主题, 发帖人, 内容, 发帖时间 } }'
      check:
        - 每回合整体刷新帖子表；含主题/正文/发帖人/时间；可噪音帖与主线讨论混排
    私信:
      type: '{ [id]: { 发送人, 内容, 发送时间 } }'
      check:
        - 剧情触发时追加；旧信可 remove

  交易行:
    系统商城:
      type: '{ [id]: { 名称, 价格, 描述, 备注 } }'
      check:
        - 由脚本按生存天数刷新十项基础生存物资；LLM 勿 Patch
        - 禁止武器、奢侈品、狩猎/副本专属、色情向商品
    _商城刷新于天数:
      type: number
      check:
        - 只读，脚本维护
    玩家交易:
      type: '{ [id]: { 物品名称, 描述, 售卖人, 上架时间, 价格 } }'
      check:
        - 挂单/撤单/成交时更新；insert 须写 描述；成交 remove

  副本列表:
    type: '{ [id]: { 副本名称, 副本内容, 副本难度, 副本地点, 副本奖励 } }'
    check:
      - 发现或开放新关卡时 insert

  排行榜:
    type: |-
      { 杀戮榜: { 地区|全球: record TOP10 { 排名1~10, 昵称, 杀怪数量 } },
        财富榜: { 地区|全球: record TOP10 { 排名1~10, 昵称, SP } },
        总榜: record TOP10 { 排名1~10, 昵称 } }
    check:
      - 五张榜单（杀戮·地区/全球、财富·地区/全球、总榜）各维持前十名；键宜 rank_1~rank_10，排名 1~10 唯一
      - 模拟大世界玩家自由演化：每回合可位次轮换、数值微调、玩家死亡 remove、空位 insert；不必等赛季结算才动榜
    昵称:
      check:
        - initvar 五张榜全部昵称为「匿名」
        - 每回合可随机让 1~2 个席位在「匿名」与具体昵称间切换（出现或消失）；五张榜合计非匿名席位占比不超过 60%
        - 全球榜昵称可用不同语言；地区榜以当前世界.地点所在区域语境为主
        - '{{user}} 取论坛名后，若剧情需要可将其昵称 Patch 进相应榜单（须与正文一致）'
    杀怪数量:
      type: number
      check:
        - 仅杀戮榜（地区/全球）条目；展示格式 No.X 昵称（杀怪数量）
        - 只增不减或停滞；据时间流逝极缓慢增长（完整昼夜约 +0~+3，跳日略多），禁止单回合暴涨
        - 玩家死亡 remove 条目时随之消失；竞争可导致位次轮换
    SP:
      type: number
      check:
        - 仅财富榜（地区/全球）条目；展示格式 No.X 昵称（SP数值）SP
        - 可增可减；据时间流逝极缓慢变化（完整昼夜 delta 宜 ±0~±5），大额变动须有交易/狩猎等剧情依据
        - 玩家破产或死亡可 remove 或 replace 为匿名并重置低位 SP
    地区与全球:
      check:
        - 同榜同排名位：地区榜杀怪数量/SP 须严格小于全球榜对应席位（全球第 1 名数值 > 地区第 1 名，以此类推）
        - 若全球榜已有非零基准，地区榜同档数值宜为全球同档的 30%~70%
    总榜:
      check:
        - 仅 排名+昵称，无附属数值；展示格式 No.X 昵称
        - 综合声望/生存成就驱动位次轮换；规则同昵称演化（匿名比例、死亡消失、多语言全球语境）
