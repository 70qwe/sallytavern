---
变量更新规则:
  世界:
    日期:
      check:
        - 剧情明确跨越午夜或发生「新的一天」类叙述时再前进，保持与事件节奏一致
    地点:
      check:
        - 角色进入新区域、载具/传送/队伍转移等造成场景变化时更新
    天气:
      check:
        - 时间推进、区域变更或重大气象事件时调整，与地点和季节保持自洽
    生存天数:
      type: number
      check:
        - 每经过一次完整昼夜循环或剧情明确跳日 +1；时间跳跃需说明原因
    季节:
      check:
        - 长时段剧情或进入新自然阶段时更新，如从晚春到盛夏
    当前赛季:
      check:
        - 系统公告、极寒/极热等世界规则切换、或故事进入新的大阶段时更新
    赛季预计持续时间:
      check:
        - 与当前赛季同时调整，使用叙事内可读的时间段描述（天/周等）

  主角:
    uid:
      check:
        - 格式为「姓名首字母（或约定缩写）-00010086」，与 {{user}} 绑定；不因小事改动，除非叙事明确账户重置
    种族:
      check:
        - 初始为「人类」；当污染值在叙事上超过 100（可比百分号理解为恶化刻度）时，可改写为变异/混血等非人种族，须在剧情中明示因果；降幅回落不一定立即还原种族，除非有净化类强设定
    昵称:
      check:
        - 初始可为「[未命名]」；仅在玩家改名或剧情赋予外号时更新
    梦魇欲魔:
      type: |-
        {
          名称: '梦魇欲魔';
          阶段: '一' | '二' | '三' | '四';
          能力列表: Record<'一' | '二' | '三' | '四', string>;
        }
      check:
        - 名称恒为「梦魇欲魔」；阶段仅在重大觉醒、仪式或系统判定进阶时改变，单次回复至多一级
        - 「能力列表」四键常驻；阶段变化时可微调对应档位的文案以反映新效果，禁止清空他人阶段条目
    sp:
      type: number
      check:
        - 任务结算、狩猎产出、交易差值、系统奖惩时调整；大额变动需强因果
    污染值:
      type: number
      range: 0~999
      check:
        - 接触污染源、服用风险物质、特定区域停留上升；净化、医疗、休息可下降；允许超过 100% 表示恶化程度但上限由 schema 约束
    饱食度:
      type: number
      range: 0~999
      check:
        - 进食与饮水恢复，长途跋涉、战斗、疾病消耗；可超过 100% 表示充盈或超载状态依叙事解释
    力量.${当前|上限}:
      type: number
      check:
        - initvar 中「当前」可为占位；在角色建立、开局盘点或首次体现体格/战斗背景的叙事中，应据 {{user}} 人设与背景用 Patch 写成与正文自洽的当前与上限（上限可与 schema 上限一致或略低）；勿长期保留与叙事矛盾的默认数
        - 训练、负重、伤病、强化道具或剥夺力量事件分别作用当前或上限；单次调整宜克制
    体质.${当前|上限}:
      type: number
      check:
        - initvar 中「当前」可为占位；同上，在体现耐力、伤病、生存履历的叙事中据人设写入与力量、敏捷协调的当前与上限
        - 疾病、负重耐力、极限生存事件改变体质相关数值；上限变化应少见且有铺垫
    敏捷.${当前|上限}:
      type: number
      check:
        - initvar 中「当前」可为占位；同上，在体现反应、身手、负重的叙事中据人设写入与力量、体质协调的当前与上限
        - 闪避训练、伤势影响腿部、轻装或负重状态改变敏捷表现
    角色总评:
      check:
        - 仅在综合实力被剧情或系统明确重评时变动；对应 E~SSS 阶梯
    角色总评评语:
      check:
        - 与「角色总评」同级更新的简短嘴臭/中立评语（如「废物」），不得与总评等级矛盾过大；非战绩回合不必改

  任务列表:
    type: |-
      {
        [任务id: string]: {
          标题: string;
          描述: string;
          奖励: string;
          进度: number;
        };
      }
    check:
        - 剧情推进任务步骤时更新进度；完成后可移除条目或标记完成（移除优先以保持整洁）
        - 新增任务一次不宜过多，优先保留主线焦点

  背包.${已用格子|格子上限}:
    type: number
    check:
        - 拾取、丢弃、堆叠合并时同步已用格子；扩容道具或赛季奖励可提高格子上限（默认 30）

  物品栏:
    type: |-
      {
        [物品id: string]: {
          名称: string;
          数量: number;
          最大堆叠: number;
          描述: string;
          稀有度: 'E' | 'D' | 'C' | 'B' | 'A' | 'S' | 'SS' | 'SSS';
        };
      }
    check:
        - 拾取、合成拆分、消耗、丢弃时更新；数量为 0 应移除该键
        - 叙事获得新物品用 insert 新增随机 id；尊重最大堆叠合并规则

  狩猎名单:
    进行中:
      type: |-
        {
          [目标id: string]: {
            姓名: string;
            uid: string;
            昵称: string;
            种族: string;
            污染值: number;
            身份: string;
            年龄: number;
            精液质量: 'E' | 'D' | 'C' | 'B' | 'A' | 'S' | 'SS' | 'SSS';
            天赋: string;
            力量: { 当前: number; 上限: number };
            体质: { 当前: number; 上限: number };
            敏捷: { 当前: number; 上限: number };
            沦陷度: number;
            当前位置: string;
            当前状态: string;
            预计产出SP: number;
          };
        }
      check:
        - 「种族」默认「人类」，更新逻辑与主角相同：污染值叙事超过 100 时可改写种族，须因果一致
        - 「污染值」随接触污染源、仪式、猎食、失败惩罚等升降，幅度参考主角污染规则
        - 「沦陷度」取值 0~100（百分比语义）；调教、交锋、谈判等推进时更新；一旦达到 100，该目标不再停留于本列表
        - 新增狩猎对象当剧情引入可追踪目标；交锋、谈判、调教进度变化时更新沦陷度、状态与位置
        - 三维属性随训练、伤病、强化波动；预计产出 SP 随强度与局势浮动；退场可 remove
        - 当「沦陷度」达到 100：必须用 Patch 将该条目从「进行中」移除，并在「已奴隶」中新增同源数据（可用 move 自 `/狩猎名单/进行中/` 至 `/狩猎名单/已奴隶/` 再补字段，或 remove + insert）；转入「已奴隶」时去掉「沦陷度」字段，将原「当前状态」迁入「当前状态或用途」，并确认「当前位置」等奴隶必填项齐全

    已奴隶:
      type: |-
        {
          [奴隶id: string]: {
            姓名: string;
            uid: string;
            昵称: string;
            种族: string;
            污染值: number;
            身份: string;
            年龄: number;
            精液质量: 'E' | 'D' | 'C' | 'B' | 'A' | 'S' | 'SS' | 'SSS';
            天赋: string;
            力量: { 当前: number; 上限: number };
            体质: { 当前: number; 上限: number };
            敏捷: { 当前: number; 上限: number };
            当前位置: string;
            当前状态或用途: string;
            预计产出SP: number;
          };
        }
      check:
        - 「种族」「污染值」与进行中条目同一套规则：默认人类；污染叙事超过 100 时可改种族
        - 进行中目标的「沦陷度」达到 100 时必须转入本列表（与进行中规则联动）；剧情上另有强制奴役或签约亦可转入
        - 转入时条目不含「沦陷度」；须写好「当前状态或用途」与「当前位置」
        - 产出 SP 代表营地被动收益或派遣收益，随叙事调度变化

  玩家论坛:
    帖子:
      type: |-
        {
          [帖子id: string]: {
            主题: string;
            发帖人: string;
            内容: string;
            发帖时间: string;
          };
        }
      check:
        - 每回合输出变量时须整体刷新 `玩家论坛.帖子`：相对上一回合应有明显更替（可清空后整表重建，也可大量增删改键）；帖子条数不设上限，按叙事需要自由增减
        - 每条帖子须含 `主题`（列表页标题）、`内容`（正文）、`发帖人`（可为「匿名」或随机昵称）、`发帖时间`（叙事内时间，不得早于游戏降临日 `世界.日期`）
        - 帖子内容可穿插无实质信息的求救、灌水、情绪发泄、烂梗或与主线弱相关的噪音帖；亦应包含对当前叙事世界中大事与小情的讨论、流言、阴谋论、阵营口吻广播等，使论坛像持续刷新的信息流
        - 每条帖子使用独立随机 id
    私信:
      type: |-
        {
          [私信id: string]: {
            发送人: string;
            内容: string;
            发送时间: string;
          };
        }
      check:
        - NPC、系统、玩家互动私信剧情出现时追加；旧私信可按叙事归档或移除防刷屏

  交易行:
    系统商城:
      type: |-
        {
          [货架id: string]: {
            名称: string;
            价格: number;
            备注: string;
          };
        }
      check:
        - 每日刷新约十项基础物资锚点，价格在 SP 经济内保持梯度；备注可写「今日货架序号」或折扣说明
    玩家交易:
      type: |-
        {
          [挂单id: string]: {
            物品名称: string;
            售卖人: string;
            上架时间: string;
            价格: number;
          };
        }
      check:
        - 玩家/NPC 挂单、撤单、成交时更新；成交 remove；上架时间随叙事给出模糊相对时间即可

  副本列表:
    type: |-
      {
        [副本id: string]: {
          副本名称: string;
          副本内容: string;
          副本难度: string;
          副本地点: string;
          副本奖励: string;
        };
      }
    check:
        - 发现新禁区、系统公告开放关卡时添加；攻略进度可通过剧情日志而非强制字段维护

  排行榜:
    type: |-
      {
        [行id: string]: {
          排名: number;
          上榜人昵称: string;
        };
      }
    check:
        - 大型事件结算或赛季刷新时调整；允许匿名显示昵称；排名数字保持唯一排序语义

  界面对话:
    type: |-
      Array<{
        角色: 'ai' | 'player';
        文本: string;
      }>
    check:
        - 需要在 HUD 同步摘要对话或玩家行动语句时追加；保持简短以防刷屏
