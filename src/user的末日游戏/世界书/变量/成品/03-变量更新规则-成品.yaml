# 成品说明：世界书「[mvu_update]变量更新规则」条目快照。
---
变量更新规则:
  世界:
    日期:
      check:
        - 剧情明确跨越午夜或发生「新的一天」类叙述时再前进，保持与事件节奏一致
        - "写入 世界.日期 时合并日期与时刻，格式为「XX年X月X日 XX：XX」（例：2026年6月4日 14：30）；时分用中文全角冒号「：」；剧情推进、休息、赶路时同步更新时刻"
    地点:
      check:
        - 角色进入新区域、载具/传送/队伍转移等造成场景变化时更新
    天气:
      check:
        - 时间推进、区域变更或重大气象事件时调整，与地点和季节保持自洽
    生存天数:
      type: number
      check:
        - 每经过一次完整昼夜循环或剧情明确跳日 +1；时间跳跃需说明原因
        - "生存天数前进时，系统商城必须刷新（后台脚本会在 _商城刷新于天数 落后于生存天数时整表替换 交易行.系统商城）；LLM 只需正确 +1 生存天数，勿手改商城条目"
    季节:
      check:
        - 长时段剧情或进入新自然阶段时更新，如从晚春到盛夏
    当前赛季:
      check:
        - 系统公告、极寒/极热等世界规则切换、或故事进入新的大阶段时更新
    赛季预计持续时间:
      check:
        - 与当前赛季同时调整，使用叙事内可读的时间段描述（天/周等）

  主角:
    uid:
      check:
        - 格式为「姓名首字母（或约定缩写）-00010086」，与 {{user}} 绑定；不因小事改动，除非叙事明确账户重置
    种族:
      check:
        - 初始为「人类」；当污染值在叙事上超过 100（可比百分号理解为恶化刻度）时，可改写为变异/混血等非人种族，须在剧情中明示因果；降幅回落不一定立即还原种族，除非有净化类强设定
    昵称:
      check:
        - 初始可为「[未命名]」；仅在玩家改名或剧情赋予外号时更新
    梦魇欲魔:
      type: |-
        {
          名称: '梦魇欲魔';
          阶段: '一' | '二' | '三' | '四';
          能力列表: Record<'一' | '二' | '三' | '四', string>;
        }
      check:
        - 名称恒为「梦魇欲魔」；阶段仅在重大觉醒、仪式或系统判定进阶时改变，单次回复至多一级
        - 「能力列表」四键常驻；阶段变化时可微调对应档位的文案以反映新效果，禁止清空他人阶段条目
    sp:
      type: number
      check:
        - 狩猎产出、交易差值、系统奖惩时调整；大额变动需强因果
    污染值:
      type: number
      range: 0~999
      check:
        - 接触污染源、服用风险物质、特定区域停留上升；净化、医疗、休息可下降；允许超过 100% 表示恶化程度但上限由 schema 约束
    饱食度:
      type: number
      range: 0~999
      check:
        - 进食与饮水恢复，长途跋涉、战斗、疾病消耗；可超过 100% 表示充盈或超载状态依叙事解释
    力量.${当前|上限}:
      type: number
      check:
        - initvar 不写死「当前」；仅在叙事首次确立 {{user}} 体格、年龄、残疾、性别与生存背景时，用 Patch 同时写入力量/体质/敏捷的「当前」（上限默认 100，永久削弱可略低）
        - 初次赋值须据人设落入区间：残疾=0；儿童=0~10；瘦小男性或瘦小女性=10~20；普通成年男性=20~30；强壮成年男性=40~50；任一维「当前」>50 须有污染异变、强化天赋等超常叙事支撑，且与污染值/天赋自洽
        - 力量偏重爆发与负重；与体质、敏捷协调，勿无因果极端割裂
        - 训练、负重、伤病、强化道具或剥夺力量事件分别作用当前或上限；单次调整宜克制
    体质.${当前|上限}:
      type: number
      check:
        - 与「力量」共用初次赋值区间与 >50 突破条件；initvar 不写死「当前」
        - 体质偏重耐病、负重续航与伤病恢复；疾病、极限生存事件改变相关数值；上限变化应少见且有铺垫
    敏捷.${当前|上限}:
      type: number
      check:
        - 与「力量」共用初次赋值区间与 >50 突破条件；initvar 不写死「当前」
        - 敏捷偏重反应、身手与负重下的机动；闪避训练、腿伤、轻装或负重状态改变敏捷表现
    角色总评:
      check:
        - 仅在综合实力被剧情或系统明确重评时变动；对应 E~SSS 阶梯
    角色总评评语:
      check:
        - 与「角色总评」同级更新的简短嘴臭/中立评语（如「废物」），不得与总评等级矛盾过大；非战绩回合不必改
    衣着:
      type: |-
        {
          上衣: string;
          下装: string;
          外套: string;
          帽子: string;
          内衣裤: string;
          袜子: string;
          鞋子: string;
          饰品: string;
          手持物: string;
        }
      check:
        - 九键常驻；初始均为空字符串，首次确立人设或换装/脱衣/损毁时在对应槽位写入简短描述
        - 单槽留空表示未穿戴或未持有；勿用「无」「null」等占位词，空则保持 ""
        - 换装、战斗损衣、赠予饰品等叙事须同步更新对应槽位

  背包.${已用格子|格子上限}:
    type: number
    check:
        - 拾取、丢弃、堆叠合并时同步已用格子；扩容道具或赛季奖励可提高格子上限（默认 30）

  物品栏:
    type: |-
      {
        [物品id: string]: {
          名称: string;
          数量: number;
          最大堆叠: number;
          描述: string;
          稀有度: 'E' | 'D' | 'C' | 'B' | 'A' | 'S' | 'SS' | 'SSS';
        };
      }
    check:
        - 拾取、合成拆分、消耗、丢弃时更新；数量为 0 应移除该键
        - 叙事获得新物品用 insert 新增随机 id；尊重最大堆叠合并规则

  狩猎名单:
    进行中:
      type: |-
        {
          [目标id: string]: {
            姓名: string;
            uid: string;
            昵称: string;
            种族: string;
            污染值: number;
            身份: string;
            年龄: number;
            精液质量: 'E' | 'D' | 'C' | 'B' | 'A' | 'S' | 'SS' | 'SSS';
            天赋: string;
            力量: { 当前: number; 上限: number };
            体质: { 当前: number; 上限: number };
            敏捷: { 当前: number; 上限: number };
            沦陷度: number;
            当前位置: string;
            当前状态: string;
            预计产出SP: number;
            衣着: {
              上衣: string;
              下装: string;
              外套: string;
              帽子: string;
              内衣裤: string;
              袜子: string;
              鞋子: string;
              饰品: string;
              手持物: string;
            };
          };
        }
      check:
        - 「种族」默认「人类」，更新逻辑与主角相同：污染值叙事超过 100 时可改写种族，须因果一致
        - 「污染值」随接触污染源、仪式、猎食、失败惩罚等升降，幅度参考主角污染规则
        - 「沦陷度」取值 0~100（百分比语义）；调教、交锋、谈判等推进时更新；一旦达到 100，该目标不再停留于本列表
        - 新增狩猎对象当剧情引入可追踪目标；交锋、谈判、调教进度变化时更新沦陷度、状态与位置
        - 首次写入或新增目标的三维时，适用与主角相同的体型档位区间（残疾 0 / 儿童 0~10 / 瘦小 10~20 / 普通成年男 20~30 / 强壮成年男 40~50；>50 须有超常叙事）；勿填无因果的占位数
        - 三维属性随训练、伤病、强化波动；预计产出 SP 随强度与局势浮动；退场可 remove
        - 当「沦陷度」达到 100：必须用 Patch 将该条目从「进行中」移除，并在「已奴隶」中新增同源数据（可用 move 自 `/狩猎名单/进行中/` 至 `/狩猎名单/已奴隶/` 再补字段，或 remove + insert）；转入「已奴隶」时去掉「沦陷度」字段，将原「当前状态」迁入「当前状态或用途」，并确认「当前位置」等奴隶必填项齐全；「衣着」九槽随条目一并保留
        - 目标首次登场或可见换装时更新「衣着」各槽；规则同主角.衣着

    已奴隶:
      type: |-
        {
          [奴隶id: string]: {
            姓名: string;
            uid: string;
            昵称: string;
            种族: string;
            污染值: number;
            身份: string;
            年龄: number;
            精液质量: 'E' | 'D' | 'C' | 'B' | 'A' | 'S' | 'SS' | 'SSS';
            天赋: string;
            力量: { 当前: number; 上限: number };
            体质: { 当前: number; 上限: number };
            敏捷: { 当前: number; 上限: number };
            当前位置: string;
            当前状态或用途: string;
            预计产出SP: number;
            衣着: {
              上衣: string;
              下装: string;
              外套: string;
              帽子: string;
              内衣裤: string;
              袜子: string;
              鞋子: string;
              饰品: string;
              手持物: string;
            };
          };
        }
      check:
        - 「种族」「污染值」与进行中条目同一套规则：默认人类；污染叙事超过 100 时可改种族
        - 进行中目标的「沦陷度」达到 100 时必须转入本列表（与进行中规则联动）；剧情上另有强制奴役或签约亦可转入
        - 转入时条目不含「沦陷度」；须写好「当前状态或用途」与「当前位置」
        - 转入或新增时三维赋值适用主角同款体型档位区间，勿保留无叙事依据的占位数
        - 产出 SP 代表营地被动收益或派遣收益，随叙事调度变化
        - 「衣着」九槽规则同主角.衣着；从进行中转入时保留原有着装描述

  玩家论坛:
    帖子:
      type: |-
        {
          [帖子id: string]: {
            主题: string;
            发帖人: string;
            内容: string;
            发帖时间: string;
          };
        }
      check:
        - 每回合输出变量时须整体刷新 `玩家论坛.帖子`：相对上一回合应有明显更替（可清空后整表重建，也可大量增删改键）；帖子条数不设上限，按叙事需要自由增减
        - 每条帖子须含 `主题`（列表页标题）、`内容`（正文）、`发帖人`（可为「匿名」或随机昵称）、`发帖时间`（叙事内时间，不得早于游戏降临日 `世界.日期`）
        - 帖子内容可穿插无实质信息的求救、灌水、情绪发泄、烂梗或与主线弱相关的噪音帖；亦应包含对当前叙事世界中大事与小情的讨论、流言、阴谋论、阵营口吻广播等，使论坛像持续刷新的信息流
        - 每条帖子使用独立随机 id
    私信:
      type: |-
        {
          [私信id: string]: {
            发送人: string;
            内容: string;
            发送时间: string;
          };
        }
      check:
        - NPC、系统、玩家互动私信剧情出现时追加；旧私信可按叙事归档或移除防刷屏

  交易行:
    系统商城:
      type: |-
        {
          [货架id: string]: {
            名称: string;
            价格: number;
            备注: string;
          };
        }
      check:
        - "每前进 1 个生存天数必须刷新一次（与 世界.生存天数 对齐；由脚本写入，LLM 勿 Patch /交易行/系统商城 或 /交易行/_商城刷新于天数）"
        - "刷新后固定 10 项，须为基础生存物资：口粮/净水/医疗/保暖/照明/清洁防疫/储水/简易工具等；禁止武器弹药、奢侈品、狩猎专属道具、副本钥匙、色情向商品"
        - 价格在 SP 经济内保持梯度（约 15～75）；备注写「第 N 天货架 x/10」
    _商城刷新于天数:
      type: number
      check:
        - 只读：由「商城刷新」脚本维护，与最近一次系统商城刷新时的 `世界.生存天数` 一致；LLM 勿写入
    玩家交易:
      type: |-
        {
          [挂单id: string]: {
            物品名称: string;
            售卖人: string;
            上架时间: string;
            价格: number;
          };
        }
      check:
        - 玩家/NPC 挂单、撤单、成交时更新；成交 remove；上架时间随叙事给出模糊相对时间即可

  副本列表:
    type: |-
      {
        [副本id: string]: {
          副本名称: string;
          副本内容: string;
          副本难度: string;
          副本地点: string;
          副本奖励: string;
        };
      }
    check:
        - 发现新禁区、系统公告开放关卡时添加；攻略进度可通过剧情日志而非强制字段维护

  排行榜:
    type: |-
      {
        [行id: string]: {
          排名: number;
          上榜人昵称: string;
        };
      }
    check:
        - 大型事件结算或赛季刷新时调整；允许匿名显示昵称；排名数字保持唯一排序语义

  界面对话:
    type: |-
      Array<{
        角色: 'ai' | 'player';
        文本: string;
      }>
    check:
        - 需要在 HUD 同步摘要对话或玩家行动语句时追加；保持简短以防刷屏
