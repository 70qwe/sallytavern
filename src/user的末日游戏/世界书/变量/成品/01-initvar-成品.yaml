# 成品说明：本文件为 initvar 快照；日常维护请优先编辑上级目录 `initvar.yaml`。
# yaml-language-server: $schema=../../../schema.json
# 在编写 initvar 之前, 请先保证终端有在运行 `pnpm watch`, 这会生成 schema.json 用于检验 initvar 是否有效
#
# UID 约定：取 {{user}} 姓名拼音首字母大写（或汉字取首字缩写规则由玩家自定）+「-00010086」。占位「X」表示待替换。
# 狩猎条目：`种族` 逻辑同主角；每人另有 `污染值`，叙事超过 100 时可配合改写种族（详见变量更新规则）。
# `物品栏` / `狩猎名单` 可为空对象 {}；新增条目时键名可用任意 id，字段结构须符合 schema。
世界:
  日期: ''
  地点: ''
  天气: ''
  生存天数: 1
  季节: ''
  当前赛季: 降临赛季
  赛季预计持续时间: 预计 7 天
主角:
  姓名: '{{user}}'
  uid: X-00010086
  种族: 人类
  昵称: '[未命名]'
  梦魇欲魔:
    名称: 梦魇欲魔
    阶段: 一
    能力列表:
      一: 梦境潜入
      二: 催眠控制
      三: 时间暂停
      四: 常识修改
  sp: 0
  污染值: 0
  饱食度: 80
  # 力量/体质/敏捷「当前」为占位；请由剧情在开局或角色确立时写入与 {{user}} 人设相符的数值（见《变量更新规则》）。
  力量:
    当前: 8
    上限: 100
  体质:
    当前: 9
    上限: 100
  敏捷:
    当前: 11
    上限: 100
