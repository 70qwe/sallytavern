# yaml-language-server: $schema=./character.zh.schema.json
头像: null
版本: 1.0.0
作者: ''
备注: |-
  Tavern Helper MVU 模板角色卡「user的末日游戏」。
  当前以世界书「user的末日游戏世界书1.0」为最新基准：请在酒馆将角色卡或聊天绑定到该书；脚本会按绑定自动找到世界书，无需在代码里写死书名。
  若条目标题为短名（如「变量更新规则」「多api输出格式」），与模板 YAML 不一致亦可，仓库内 WB_ENTRY_ALIASES 已做别名匹配。

第一条消息:
  - 文件: 第一条消息/0

角色描述: ''

锚点:
  - &分隔符
    启用: false
    激活策略:
      类型: 向量化
    插入位置:
      类型: 角色定义之前
      顺序: 14720
    激活概率: 100
    内容: ''

世界书名称: 与角色卡名称相同
条目:
  - 名称: 末世叙事文风
    启用: true
    激活策略:
      类型: 蓝灯
    插入位置:
      类型: 指定深度
      角色: 系统
      深度: 0
      顺序: 14720
    激活概率: 100
    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    文件: 世界书/文风

  - 名称: 交错频道
    启用: true
    激活策略:
      类型: 蓝灯
    插入位置:
      类型: 指定深度
      角色: 系统
      深度: 0
      顺序: 14720
    激活概率: 100
    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    文件: 世界书/交错频道

  - 名称: 玩家的游戏历史
    启用: true
    激活策略:
      类型: 蓝灯
    插入位置:
      类型: 指定深度
      角色: 系统
      深度: 0
      顺序: 14719
    激活概率: 100
    递归:
      不可被其他条目激活: true
      不可激活其他条目: true
    文件: 世界书/玩家的游戏历史

  - 文件夹: 变量
    条目:
      - 名称: ===变量开始===
        <<: *分隔符

      - 名称: '[initvar]变量初始化勿开'
        启用: false
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 角色定义之前
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/initvar

      - 名称: 变量列表
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/变量列表

      - 名称: '[mvu_update]变量更新规则'
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/变量更新规则

      - 名称: '[mvu_update]变量输出格式'
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/变量输出格式

      - 名称: 主叙事输出格式-共用
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14850
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/主叙事输出格式-共用

      - 名称: 单API输出格式
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14851
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/单API输出格式

      - 名称: 多api输出格式-主
        启用: false
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14851
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/多api输出格式-主

      - 名称: 多api输出格式-副
        启用: false
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/多api输出格式-副

      - 名称: ===变量结束===
        <<: *分隔符

  - 文件夹: 角色
    条目:
      - 名称: ===角色开始===
        <<: *分隔符

      - 名称: 角色详情
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 角色定义之后
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/角色/角色详情

      - 名称: 角色阶段
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        文件: 世界书/角色/角色阶段

      - 名称: ===角色结束===
        <<: *分隔符

扩展字段:
  正则:
    - 正则名称: '[不发送]去除变量更新'
      id: c2a89f10-4e7b-4d3c-9a8f-1100ddeeffaa
      启用: true
      查找表达式: /<update(?:variable)?>(?:(?!.*<\/update(?:variable)?>).*$|.*<\/update(?:variable)?>)/gsi
      内容: ''
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: false
        仅格式提示词: true
      最大深度: 3

    - 正则名称: '[折叠]变量更新中'
      id: d3b90a21-5f8c-5e4d-ba9f-2211eeffffbb
      启用: true
      查找表达式: /<update(?:variable)?>(?!.*<\/update(?:variable)?>)\s*(.*)\s*$/gsi
      内容: |-

        <details>
        <summary>变量更新中{{random::.::..::...}}</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[折叠]完整变量更新'
      id: e4ca1b32-609d-6f5e-dcaf-3322ffffffcc
      启用: true
      查找表达式: /<update(?:variable)?>\s*(.*)\s*<\/update(?:variable)?>/gsi
      内容: |-

        <details>
        <summary>变量更新情况</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[界面]美化状态栏'
      id: f5db2c43-710e-706f-ecb0-4433000000dd
      启用: false
      查找表达式: <StatusPlaceHolderImpl/>
      内容: |-
        <style>
        .status-bar {
          font-size: 14px;
          color: #a3d9a5;
          border: 1px solid #a3d9a5;
          padding: 5px;
          border-radius: 8px;
        }
        </style>
        <div class="status-bar">
        生存天数: {{format_message_variable::stat_data.世界.生存天数}} · 地点: {{format_message_variable::stat_data.世界.地点}}
        </div>
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    # 整段 AI 楼层替换为界面；与角色卡局部正则 user的末日游戏-界面 保持一致
    - 正则名称: '[界面]前端界面末日游戏'
      id: f6ec3d54-821f-817f-fdc1-5544111111ee
      启用: true
      查找表达式: /.+/s
      内容: |-
        <body>
        <script>
        (function () {
          var u = 'https://testingcf.jsdelivr.net/gh/70qwe/sallytavern@main/dist/user的末日游戏/界面/末日游戏/';
          $('body').load(u + 'index.html', function () {
            $.getScript(u + 'index.js');
          });
        })();
        </script>
        </body>
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

  # 脚本与界面均从 GitHub 仓库 70qwe/sallytavern 的 dist/ 经 jsdelivr 加载；本地开发时可改回 http://127.0.0.1:5500/dist/...
  酒馆助手:
    脚本库:
      - 名称: mvu
        id: a91d70e1-2bc4-4f8e-b201-001122334455
        启用: true
        类型: 脚本
        内容: |-
          import 'https://testingcf.jsdelivr.net/gh/MagicalAstrogy/MagVarUpdate/artifact/bundle.js';

      - 名称: 变量结构
        id: b02e81f2-3cd5-5f9f-c312-112233445566
        启用: true
        类型: 脚本
        内容: |-
          import 'https://testingcf.jsdelivr.net/gh/70qwe/sallytavern@main/dist/user的末日游戏/脚本/变量结构/index.js';

      - 名称: 立即事件
        id: c13f92a3-4de6-6a0f-d423-223344556677
        启用: false
        类型: 脚本
        内容: |-
          import 'https://testingcf.jsdelivr.net/gh/70qwe/sallytavern@main/dist/user的末日游戏/脚本/立即事件/index.js';

      - 名称: 游戏历史
        id: e35fa4c5-6bf8-8c2d-f645-445566778899
        启用: true
        类型: 脚本
        内容: |-
          import 'https://testingcf.jsdelivr.net/gh/70qwe/sallytavern@main/dist/user的末日游戏/脚本/游戏历史/index.js';

      - 名称: 多API串联
        id: f46fb5d6-7cf9-9d3e-a756-556677889900
        启用: true
        类型: 脚本
        内容: |-
          import 'https://testingcf.jsdelivr.net/gh/70qwe/sallytavern@main/dist/user的末日游戏/脚本/多API串联/index.js';

